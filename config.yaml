# Diamond Trader configuratie
# Nieuwe longposities staan tijdelijk uit.
# De paper-shorttest gebruikt strategie short_breakout_v2.
# Echte orders blijven volledig uitgeschakeld zolang risk.dry_run true is.

quote: EUR
timeframe: 15m

symbols:
  - BTC/EUR
  - ETH/EUR
  - SOL/EUR
  - XRP/EUR
  - ADA/EUR

trading:
  # Tijdelijk uitgeschakeld na de zwakke eerste longtest.
  enable_spot: false

  # Alleen gesimuleerde shortposities.
  enable_short_signals: true

  # Nooit tegelijk long en short op dezelfde munt.
  allow_long_and_short_same_symbol: false

  # Longs en paper-shorts samen.
  max_total_positions: 5

risk:
  dry_run: true
  fixed_stake_quote: 120
  max_open_positions: 5
  eur_reserve: 1000
  max_spread_pct: 0.25
  min_profit_eur: 1.00
  cooldown_minutes: 240
  skip_log_every_seconds: 600

  # Handmatig bezit wordt nooit door de bot verkocht.
  avoid_symbols_with_existing_balance: false
  existing_balance_dust: 0.00000001

  # Alleen gebruikt voor de dry-run simulatie van spotposities.
  simulated_quote_balance: 3000

fees:
  taker_fee_pct: 0.25

signals:
  use_sma: true
  sma_fast: 20
  sma_slow: 60
  require_crossover: true

  use_rsi: true
  rsi_len: 14
  rsi_buy_min: 55
  rsi_buy_max: 70

  use_atr_filter: true
  atr_len: 14
  min_atr_pct: 0.30

  atr_tp_mult: 2.6
  atr_sl_mult: 1.2
  hard_stop_loss_pct: 3.0

  trailing_enabled: true
  trailing_atr_mult: 1.2
  profit_trailing_trigger_pct: 1.0
  profit_trailing_pullback_pct: 0.5
  exit_on_trend_break: true

scanner:
  auto_scan: false
  top_n_markets: 5
  min_quote_volume: 250000

  exclude_bases:
    - EUR
    - USDT
    - USDC
    - DAI

news:
  enabled: false
  timespan_hours: 24
  top_n_for_news_check: 3
  min_news_score_to_buy: 0.0
  bad_news_score_to_exit: -1.5
  allow_buy_without_news: true
  fail_open: true
  block_on_severe_negative: true
  force_exit_on_severe_negative: false
  use_fear_greed: false
  fear_greed_buy_max: 75
  max_records: 100

short:
  # Altijd uitsluitend een papieren simulatie.
  enabled: true
  paper_only: true
  strategy_version: short_breakout_v2

  # Eerste test: maximaal één short zonder hefboom.
  max_open_positions: 1
  leverage: 1
  margin_per_trade: 30
  min_profit_eur: 0.05
  cooldown_minutes: 240
  test_target_trades: 20

  use_sma: true
  sma_fast: 20
  sma_slow: 60

  # Instap bij een nieuwe bearish kruising OF bij een nieuwe
  # neerwaartse uitbraak binnen een bestaande dalende trend.
  allow_crossover_entry: true
  allow_breakout_entry: true
  breakout_lookback_candles: 8
  require_fast_sma_falling: true

  # Niet shorten wanneer RSI al extreem oversold is.
  use_rsi: true
  rsi_len: 14
  rsi_sell_min: 25
  rsi_sell_max: 45

  use_atr_filter: true
  atr_len: 14
  min_atr_pct: 0.30
  atr_tp_mult: 2.4
  atr_sl_mult: 1.2

files:
  state_file: /var/data/diamond_state.json
  trades_file: /var/data/diamond_transactions.csv
  control_file: /var/data/diamond_control.json
  short_test_baseline_file: /var/data/diamond_short_test_baseline.json
  short_test_report_file: /var/data/diamond_short_test_report.json

logging:
  level: INFO
  loop_sleep_seconds: 300
  candles_limit: 400
